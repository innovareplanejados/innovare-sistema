<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
padding:15px;
}
h1{color:#D4AF37}
.board{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}
.col{
background:#181818;
padding:12px;
border-radius:14px;
min-height:250px;
}
.card{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:14px;
}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
cursor:pointer;
}
select{
width:100%;
margin-top:6px;
padding:8px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>Innovare Planejados</h1>
<p>Quadro de Obras</p>

<button onclick="novaObra()">🪵 Nova Obra</button>

<div class="board">

<div class="col">
<h3>📞 Lead</h3>
<div id="lead"></div>
</div>

<div class="col">
<h3>📐 Medição</h3>
<div id="medicao"></div>
</div>

<div class="col">
<h3>🧾 Orçamento</h3>
<div id="orcamento"></div>
</div>

<div class="col">
<h3>💰 Fechado</h3>
<div id="fechado"></div>
</div>

<div class="col">
<h3>🪵 Produção</h3>
<div id="producao"></div>
</div>

<div class="col">
<h3>🔧 Montagem</h3>
<div id="montagem"></div>
</div>

<div class="col">
<h3>✅ Entregue</h3>
<div id="entregue"></div>
</div>

</div>

<script>
let obras = JSON.parse(localStorage.getItem("obras")) || [];

const etapas = [
"lead",
"medicao",
"orcamento",
"fechado",
"producao",
"montagem",
"entregue"
];

function salvar(){
localStorage.setItem("obras", JSON.stringify(obras));
}

function render(){
etapas.forEach(e=>{
document.getElementById(e).innerHTML="";
});

obras.forEach((o,i)=>{
let mostrarValor = ["orcamento","fechado","producao","montagem","entregue"].includes(o.etapa);

let html = `
<div class="card">
<b>${o.nome}</b><br>
${mostrarValor ? "R$ " + Number(o.valor).toFixed(2) + "<br>" : ""}
📞 ${o.tel}<br>

<select onchange="mudar(${i}, this.value)">
${etapas.map(et=>
`<option value="${et}" ${o.etapa==et?'selected':''}>${et}</option>`
).join("")}
</select>
</div>
`;

document.getElementById(o.etapa).innerHTML += html;
});

salvar();
}

function novaObra(){
let nome = prompt("Nome cliente:");
if(!nome)return;

let valor = prompt("Valor:");
let tel = prompt("Telefone:");

obras.push({
nome:nome,
valor:valor || 0,
tel:tel || "",
etapa:"lead"
});

render();
}

function mudar(i,nova){
obras[i].etapa = nova;
render();
}

render();
</script>

</body>
</html>
