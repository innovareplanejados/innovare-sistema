<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare CEO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="margin:0;background:#090909;color:#fff;font-family:Arial;padding:20px">

<h1 style="color:#D4AF37;font-size:34px">Innovare Planejados</h1>
<p style="color:#aaa">CEO Corporativo</p>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px">

<div style="background:#161616;padding:20px;border-radius:14px">
<h3>👥 Clientes</h3>
<p id="totClientes">0</p>
</div>

<div style="background:#161616;padding:20px;border-radius:14px">
<h3>💰 Caixa</h3>
<p id="totCaixa">R$ 0,00</p>
</div>

<div style="background:#161616;padding:20px;border-radius:14px">
<h3>🧾 Orçamentos</h3>
<p id="totOrc">0</p>
</div>

<div style="background:#161616;padding:20px;border-radius:14px">
<h3>⚠️ Contas</h3>
<p id="totContas">0</p>
</div>

</div>

<div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px">

<button onclick="novoCliente()" style="padding:15px;background:#D4AF37;border:none;border-radius:12px">👥 Novo Cliente</button>

<button onclick="editarCliente()" style="padding:15px;background:#1a1a1a;color:#fff;border:none;border-radius:12px">✏️ Editar Cliente</button>

<button onclick="excluirCliente()" style="padding:15px;background:#1a1a1a;color:#fff;border:none;border-radius:12px">🗑️ Excluir Cliente</button>

<button onclick="novaEntrada()" style="padding:15px;background:#1a1a1a;color:#fff;border:none;border-radius:12px">💰 Nova Entrada</button>

<button onclick="novoOrc()" style="padding:15px;background:#1a1a1a;color:#fff;border:none;border-radius:12px">🧾 Novo Orçamento</button>

<button onclick="conta()" style="padding:15px;background:#1a1a1a;color:#fff;border:none;border-radius:12px">⚠️ Conta a Pagar</button>

</div>

<div style="background:#161616;padding:20px;border-radius:14px;margin-top:20px">
<h2>Clientes</h2>
<div id="listaClientes"></div>
</div>

<div style="background:#161616;padding:20px;border-radius:14px;margin-top:20px">
<h2>Resumo CEO</h2>
<p>Meta mensal: R$ 50.000</p>
<p id="lucro">Lucro atual: R$ 0,00</p>
</div>

<script>
const supabase = window.supabase.createClient(
'https://ckmotdxrdscateoftboi.supabase.co',
'sb_publishable_05arcMnUYFrLB0xnBX0Upg_GPkSS2_u'
);

async function carregar(){
let {data:clientes}=await supabase.from('clientes').select('*');
let {data:fin}=await supabase.from('financeiro').select('*');
let {data:orc}=await supabase.from('orcamentos').select('*');
let {data:cont}=await supabase.from('agenda').select('*');

document.getElementById('totClientes').innerText = clientes.length;
document.getElementById('totOrc').innerText = orc.length;
document.getElementById('totContas').innerText = cont.length;

let caixa = 0;
fin.forEach(i=> caixa += Number(i.valor||0));

document.getElementById('totCaixa').innerText='R$ '+caixa.toFixed(2).replace('.',',');
document.getElementById('lucro').innerText='Lucro atual: R$ '+caixa.toFixed(2).replace('.',',');

document.getElementById('listaClientes').innerHTML =
clientes.map(c=>'<p>👤 '+c.id+' - '+c.nome+' - '+(c.telefone||'')+'</p>').join('');
}

async function novoCliente(){
let nome=prompt('Nome');
let tel=prompt('Telefone');
if(nome){
await supabase.from('clientes').insert([{nome:nome,telefone:tel}]);
carregar();
}
}

async function editarCliente(){
let id=prompt('ID cliente');
let nome=prompt('Novo nome');
if(id && nome){
await supabase.from('clientes').update({nome:nome}).eq('id',id);
carregar();
}
}

async function excluirCliente(){
let id=prompt('ID cliente');
if(id){
await supabase.from('clientes').delete().eq('id',id);
carregar();
}
}

async function novaEntrada(){
let v=prompt('Valor');
if(v){
await supabase.from('financeiro').insert([{tipo:'entrada',valor:v,descricao:'manual'}]);
carregar();
}
}

async function novoOrc(){
let c=prompt('Cliente');
let v=prompt('Valor');
if(c){
await supabase.from('orcamentos').insert([{cliente:c,valor:v,status:'aberto'}]);
carregar();
}
}

async function conta(){
let t=prompt('Conta');
if(t){
await supabase.from('agenda').insert([{titulo:t,data:'pendente'}]);
carregar();
}
}

carregar();
</script>

</body>
</html>
