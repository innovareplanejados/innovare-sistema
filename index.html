<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<meta name="theme-color" content="#0b0b0b">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial}
.topo{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.card{background:#181818;padding:18px;border-radius:14px}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#D4AF37;
font-size:16px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}
.sec{background:#181818;padding:18px;border-radius:14px;margin-top:15px}
</style>
</head>

<body>

<div class="topo">

<h1 style="color:#D4AF37">Innovare Planejados</h1>
<p>Painel Executivo</p>

<div class="grid">

<div class="card">
<h3>💰 Caixa</h3>
<p id="caixa">R$ 0,00</p>
</div>

<div class="card">
<h3>👥 Clientes</h3>
<p id="clientes">0</p>
</div>

<div class="card">
<h3>🧾 Obras</h3>
<p id="obras">0</p>
</div>

<div class="card">
<h3>🎯 Meta</h3>
<p id="meta">0%</p>
</div>

</div>

<button onclick="novoCliente()">👥 Novo Cliente</button>
<button onclick="novaEntrada()">💰 Nova Entrada</button>
<button onclick="novaObra()">🪵 Nova Obra</button>
<button onclick="recarregar()">🔄 Atualizar</button>

<div class="sec">
<h2>Atividades</h2>
<div id="lista"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
'https://ckmotdxrdscateoftboi.supabase.co',
'sb_publishable_05arcMnUYFrLB0xnBX0Upg_GPkSS2_u'
);

async function recarregar(){
try{

const {data:clientes=[]} = await supabase.from('clientes').select('*');
const {data:financeiro=[]} = await supabase.from('financeiro').select('*');
const {data:orcamentos=[]} = await supabase.from('orcamentos').select('*');

document.getElementById('clientes').innerText = clientes.length;
document.getElementById('obras').innerText = orcamentos.length;

let total = 0;
financeiro.forEach(i=> total += Number(i.valor || 0));

document.getElementById('caixa').innerText =
'R$ ' + total.toFixed(2).replace('.',',');

let meta = ((total/80000)*100).toFixed(0);
document.getElementById('meta').innerText = meta + '%';

document.getElementById('lista').innerHTML =
`
<p>👥 Clientes cadastrados: ${clientes.length}</p>
<p>💰 Movimentos financeiros: ${financeiro.length}</p>
<p>🧾 Obras abertas: ${orcamentos.length}</p>
`;

}catch(e){
alert("Erro ao carregar dados");
console.log(e);
}
}

async function novoCliente(){
let nome = prompt("Nome do cliente");
let tel = prompt("Telefone");
if(!nome) return;

await supabase.from('clientes').insert([
{nome:nome, telefone:tel}
]);

recarregar();
}

async function novaEntrada(){
let valor = prompt("Valor da entrada");
if(!valor) return;

await supabase.from('financeiro').insert([
{tipo:'entrada', valor:valor, descricao:'manual'}
]);

recarregar();
}

async function novaObra(){
let cliente = prompt("Cliente");
let valor = prompt("Valor");
if(!cliente) return;

await supabase.from('orcamentos').insert([
{cliente:cliente, valor:valor, status:'lead'}
]);

recarregar();
}

recarregar();
</script>

</body>
</html>
