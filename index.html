<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}header{padding:16px;background:#181818;position:sticky;top:0}h1{margin:0;color:#D4AF37}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tabs button{padding:10px;border:none;border-radius:8px;background:#D4AF37;color:#000;font-weight:bold;cursor:pointer}.page{display:none;padding:14px}.show{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.panel,.card{background:#181818;padding:12px;border-radius:12px}.thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;margin:4px;cursor:pointer}.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:99}.modal img{max-width:95%;max-height:90vh}.close{position:absolute;top:15px;right:15px;background:#D4AF37;color:#000;padding:8px;border-radius:8px;cursor:pointer}#svg{position:absolute;left:0;top:0;width:100%;height:100%}
</style>
</head>
<body>
<header><h1>Innovare Planejados</h1><div class="tabs"><button onclick="openPage('quadro')">Quadro</button><button onclick="openPage('agenda')">Agenda</button><button onclick="openPage('dash')">Dashboard</button><button onclick="openPage('fotos')">Fotos</button></div></header>
<div id="quadro" class="page show"><div class="panel"><button onclick="novaObra()">Nova Obra</button><div id="lista"></div></div></div>
<div id="agenda" class="page"><div class="panel"><button onclick="novoEvento()">Novo Evento</button><div id="agendaLista"></div></div></div>
<div id="dash" class="page"><div class="grid"><div class="panel">Obras: <span id="d1"></span></div><div class="panel">Eventos: <span id="d2"></span></div><div class="panel">Fotos: <span id="d3"></span></div></div></div>
<div id="fotos" class="page"><div class="panel" id="galeria"></div></div>
<div class="modal" id="modal"><div class="close" onclick="fecharFoto()">X</div><div style="position:relative"><img id="img"><svg id="svg"></svg></div><div style="position:fixed;bottom:20px;left:20px;right:20px"><button onclick="modoMedida()">Adicionar Medida</button></div></div>
<script>
let obras=JSON.parse(localStorage.getItem('obras')||'[]');let agenda=JSON.parse(localStorage.getItem('agenda')||'[]');let medidas=JSON.parse(localStorage.getItem('medidas')||'{}');let fotoAtual='';let medindo=false;let p1=null;
function save(){localStorage.setItem('obras',JSON.stringify(obras));localStorage.setItem('agenda',JSON.stringify(agenda));localStorage.setItem('medidas',JSON.stringify(medidas));}
function openPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));document.getElementById(id).classList.add('show');render();}
function render(){renderQuadro();renderAgenda();renderDash();renderFotos();save();}
function renderQuadro(){let html='';obras.forEach((o,i)=>{html+=`<div class='card'><b>${o.nome}</b><br>${o.tel}<br>R$ ${Number(o.valor).toFixed(2)}<br><input type='file' accept='image/*' onchange='foto(${i},this)'>`; (o.fotos||[]).forEach(f=>html+=`<img src='${f}' class='thumb' onclick='abrirFoto("${f}")'>`); html+='</div>';});document.getElementById('lista').innerHTML=html||'Sem obras';}
function renderAgenda(){document.getElementById('agendaLista').innerHTML=agenda.map(a=>a.nome+' - '+a.hora).join('<br>')||'Sem eventos';}
function renderDash(){document.getElementById('d1').innerText=obras.length;document.getElementById('d2').innerText=agenda.length;let ft=0;obras.forEach(o=>ft+=(o.fotos||[]).length);document.getElementById('d3').innerText=ft;}
function renderFotos(){let h='';obras.forEach(o=>(o.fotos||[]).forEach(f=>h+=`<img src='${f}' class='thumb' onclick='abrirFoto("${f}")'>`));document.getElementById('galeria').innerHTML=h||'Sem fotos';}
function novaObra(){let nome=prompt('Cliente');if(!nome)return;let tel=prompt('Telefone');let valor=prompt('Valor');obras.push({nome,tel,valor,fotos:[]});render();}
function novoEvento(){let nome=prompt('Cliente');if(!nome)return;let hora=prompt('Hora');agenda.push({nome,hora});render();}
function foto(i,input){let file=input.files[0];if(!file)return;let r=new FileReader();r.onload=e=>{obras[i].fotos.push(e.target.result);render();};r.readAsDataURL(file);}
function abrirFoto(src){fotoAtual=src;document.getElementById('img').src=src;document.getElementById('modal').style.display='flex';setTimeout(draw,100);}
function fecharFoto(){document.getElementById('modal').style.display='none';}
function modoMedida(){medindo=true;p1=null;alert('Clique/toque em dois pontos');}
function capturar(ev){if(!medindo)return;ev.preventDefault();const img=document.getElementById('img');const r=img.getBoundingClientRect();const cx=(ev.touches?ev.touches[0].clientX:ev.clientX)-r.left;const cy=(ev.touches?ev.touches[0].clientY:ev.clientY)-r.top;if(!p1){p1={x:cx,y:cy};return;}let txt=prompt('Medida');if(!txt){medindo=false;p1=null;return;}if(!medidas[fotoAtual])medidas[fotoAtual]=[];medidas[fotoAtual].push({p1:p1,p2:{x:cx,y:cy},txt});medindo=false;p1=null;draw();save();}
function draw(){let s=document.getElementById('svg');s.innerHTML='';(medidas[fotoAtual]||[]).forEach(m=>{s.innerHTML+=`<line x1='${m.p1.x}' y1='${m.p1.y}' x2='${m.p2.x}' y2='${m.p2.y}' stroke='#D4AF37' stroke-width='3'></line><text x='${(m.p1.x+m.p2.x)/2}' y='${(m.p1.y+m.p2.y)/2-8}' fill='#D4AF37'>${m.txt}</text>`;});}
document.getElementById('img').addEventListener('click',capturar);document.getElementById('img').addEventListener('touchstart',capturar,{passive:false});render();
</script>
</body>
</html>
