<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial}
.top{background:#181818;padding:15px;position:sticky;top:0;z-index:10}
h1{margin:0;color:#D4AF37;font-size:24px}
.menu{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.menu button,.btn{
padding:12px;border:none;border-radius:10px;background:#D4AF37;
font-weight:bold;color:#000;cursor:pointer;width:100%
}
.page{display:none;padding:12px}
.show{display:block}
.board{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.col{background:#181818;padding:10px;border-radius:12px;min-height:240px}
.card{background:#222;padding:10px;border-radius:10px;margin-bottom:8px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.box{background:#181818;padding:15px;border-radius:12px}
.thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;margin:4px;cursor:pointer}
input,select{width:100%;padding:8px;margin-top:6px;border:none;border-radius:8px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:99}
.close{position:absolute;top:15px;right:15px;background:#D4AF37;color:#000;padding:10px;border-radius:10px;font-weight:bold;cursor:pointer}
.day{background:#222;padding:8px;border-radius:10px;min-height:90px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
small{color:#bbb}
.tag1{display:block;background:#1e40af;padding:4px;border-radius:6px;margin-top:4px}
.tag2{display:block;background:#D4AF37;color:#000;padding:4px;border-radius:6px;margin-top:4px}
#fotoWrap{position:relative;max-width:95vw;max-height:90vh}
#imgGrande{max-width:95vw;max-height:90vh;display:block;border-radius:12px}
#camadaMedidas{position:absolute;left:0;top:0;width:100%;height:100%}
</style>
</head>
<body>

<div class="top">
<h1>Innovare Planejados</h1>

<div class="menu">
<button onclick="abrir('quadro')">📋 Quadro</button>
<button onclick="abrir('agenda')">📅 Agenda</button>
<button onclick="abrir('dash')">📊 Dashboard</button>
<button onclick="abrir('fotos')">📸 Fotos</button>
</div>
</div>

<div id="quadro" class="page show">
<p><button class="btn" onclick="novaObra()">🪵 Nova Obra</button></p>
<div class="board">
<div class="col"><h3>📞 Lead</h3><div id="lead"></div></div>
<div class="col"><h3>📐 Medição</h3><div id="medicao"></div></div>
<div class="col"><h3>🧾 Orçamento</h3><div id="orcamento"></div></div>
<div class="col"><h3>💰 Fechado</h3><div id="fechado"></div></div>
<div class="col"><h3>🪵 Produção</h3><div id="producao"></div></div>
<div class="col"><h3>🔧 Montagem</h3><div id="montagem"></div></div>
<div class="col"><h3>✅ Entregue</h3><div id="entregue"></div></div>
</div>
</div>

<div id="agenda" class="page">
<p><button class="btn" onclick="novoEvento()">📅 Novo Compromisso</button></p>
<div class="cal" id="cal"></div>
</div>

<div id="dash" class="page">
<div class="grid">
<div class="box"><h3>👥 Obras</h3><p id="d1">0</p></div>
<div class="box"><h3>💰 Total</h3><p id="d2">R$ 0</p></div>
<div class="box"><h3>📅 Eventos</h3><p id="d3">0</p></div>
<div class="box"><h3>📸 Fotos</h3><p id="d4">0</p></div>
</div>
</div>

<div id="fotos" class="page">
<div id="galeria"></div>
</div>

<div class="modal" id="modal">
<div class="close" onclick="fecharFoto()">X</div>

<div id="fotoWrap">
<img id="imgGrande">
<svg id="camadaMedidas"></svg>
</div>

<div style="position:fixed;bottom:20px;left:20px;right:20px">
<button class="btn" onclick="modoMedida()">📏 Adicionar Medida</button>
</div>
</div>

<script>
let obras=JSON.parse(localStorage.getItem("obras"))||[];
let agenda=JSON.parse(localStorage.getItem("agenda"))||[];
let medidas=JSON.parse(localStorage.getItem("medidas"))||{};
let medindo=false,p1=null,fotoAtual="";

const etapas=["lead","medicao","orcamento","fechado","producao","montagem","entregue"];

function salvar(){
localStorage.setItem("obras",JSON.stringify(obras));
localStorage.setItem("agenda",JSON.stringify(agenda));
localStorage.setItem("medidas",JSON.stringify(medidas));
}

function abrir(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(id).classList.add("show");
render();
}

function render(){
renderQuadro();
renderAgenda();
renderDash();
renderFotos();
salvar();
}

function renderQuadro(){
etapas.forEach(e=>document.getElementById(e).innerHTML="");

obras.forEach((o,i)=>{
if(!o.fotos)o.fotos=[];

let html='<div class="card"><b>'+o.nome+'</b><br>📞 '+o.tel+'<br>R$ '+Number(o.valor).toFixed(2);

html+='<select onchange="mudar('+i+',this.value)">';
etapas.forEach(et=>html+='<option value="'+et+'" '+(o.etapa==et?'selected':'')+'>'+et+'</option>');
html+='</select>';

html+='<input type="file" accept="image/*" onchange="foto('+i+',this)">';

o.fotos.forEach(f=>html+='<img src="'+f+'" class="thumb" onclick="abrirFoto(\''+f+'\')">');

html+='</div>';

document.getElementById(o.etapa).innerHTML+=html;
});
}

function renderAgenda(){
const dias=["Seg","Ter","Qua","Qui","Sex","Sab","Dom"];
let html="";
for(let i=1;i<=7;i++){
html+='<div class="day"><b>'+dias[i-1]+'</b><br><small>'+i+'</small>';
agenda.filter(a=>Number(a.dia)==i).forEach(ev=>{
html+='<span class="'+(ev.tipo=="medicao"?"tag1":"tag2")+'">'+ev.hora+' '+ev.nome+'</span>';
});
html+='</div>';
}
document.getElementById("cal").innerHTML=html;
}

function renderDash(){
let total=0,fotos=0;
obras.forEach(o=>{
total+=Number(o.valor||0);
if(o.fotos) fotos+=o.fotos.length;
});
document.getElementById("d1").innerText=obras.length;
document.getElementById("d2").innerText="R$ "+total.toFixed(2);
document.getElementById("d3").innerText=agenda.length;
document.getElementById("d4").innerText=fotos;
}

function renderFotos(){
let html="";
obras.forEach(o=>{
if(o.fotos){
o.fotos.forEach(f=>html+='<img src="'+f+'" class="thumb" onclick="abrirFoto(\''+f+'\')">');
}
});
document.getElementById("galeria").innerHTML=html||"Sem fotos";
}

function novaObra(){
let nome=prompt("Cliente:");
if(!nome)return;
let tel=prompt("Telefone:");
let valor=prompt("Valor:");
obras.push({nome,tel:tel||"",valor:valor||0,etapa:"lead",fotos:[]});
render();
}

function mudar(i,v){obras[i].etapa=v;render();}

function foto(i,input){
let file=input.files[0];
if(!file)return;
let r=new FileReader();
r.onload=e=>{obras[i].fotos.push(e.target.result);render();}
r.readAsDataURL(file);
}

function abrirFoto(src){
fotoAtual=src;
document.getElementById("imgGrande").src=src;
document.getElementById("modal").style.display="flex";
setTimeout(desenharMedidas,100);
}

function fecharFoto(){
document.getElementById("modal").style.display="none";
}

function novoEvento(){
let tipo=prompt("medicao ou montagem");
if(!tipo)return;
let nome=prompt("Cliente:");
let dia=prompt("Dia semana 1 a 7");
let hora=prompt("Hora:");
agenda.push({tipo,nome,dia,hora});
render();
}

function modoMedida(){
medindo=true;
p1=null;
alert("Toque dois pontos na foto");
}

document.getElementById("imgGrande").addEventListener("click",capturarPonto);
document.getElementById("imgGrande").addEventListener("touchstart",capturarPonto);
function capturarPonto(e){
if(!medindo)return;

let rect=this.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

if(!p1){p1={x,y};return;}

let p2={x,y};
let txt=prompt("Digite medida (ex: 2,45 m)");
if(!txt){medindo=false;p1=null;return;}

if(!medidas[fotoAtual]) medidas[fotoAtual]=[];
medidas[fotoAtual].push({p1,p2,txt});

medindo=false;
p1=null;
desenharMedidas();
salvar();
}

function desenharMedidas(){
let svg=document.getElementById("camadaMedidas");
svg.innerHTML="";
if(!medidas[fotoAtual]) return;

medidas[fotoAtual].forEach(m=>{
svg.innerHTML+=`
<line x1="${m.p1.x}" y1="${m.p1.y}" x2="${m.p2.x}" y2="${m.p2.y}"
stroke="#D4AF37" stroke-width="3"/>
<text x="${(m.p1.x+m.p2.x)/2}" y="${(m.p1.y+m.p2.y)/2-8}"
fill="#D4AF37" font-size="18" text-anchor="middle">${m.txt}</text>
`;
});
}

render();
</script>

</body>
</html>
