<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
padding:20px;
}
h1{color:#D4AF37}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:12px;
}
.card,.sec{
background:#181818;
padding:18px;
border-radius:14px;
}
button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
font-size:16px;
cursor:pointer;
}
p{margin:6px 0}
</style>
</head>

<body>

<h1>Innovare Planejados</h1>
<p>Painel Executivo</p>

<div class="grid">

<div class="card">
<h3>💰 Caixa</h3>
<p id="caixa">R$ 0,00</p>
</div>

<div class="card">
<h3>👥 Clientes</h3>
<p id="clientes">0</p>
</div>

<div class="card">
<h3>🪵 Obras</h3>
<p id="obras">0</p>
</div>

<div class="card">
<h3>🎯 Meta</h3>
<p id="meta">0%</p>
</div>

</div>

<button onclick="novoCliente()">👥 Novo Cliente</button>
<button onclick="novaEntrada()">💰 Nova Entrada</button>
<button onclick="novaObra()">🪵 Nova Obra</button>
<button onclick="limparTudo()">🗑️ Limpar Tudo</button>

<div class="sec" style="margin-top:15px">
<h2>Atividades</h2>
<div id="lista"></div>
</div>

<script>
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let caixa = Number(localStorage.getItem("caixa")) || 0;
let obras = JSON.parse(localStorage.getItem("obras")) || [];

function salvar(){
localStorage.setItem("clientes", JSON.stringify(clientes));
localStorage.setItem("caixa", caixa);
localStorage.setItem("obras", JSON.stringify(obras));
}

function atualizar(){
document.getElementById("clientes").innerText = clientes.length;
document.getElementById("obras").innerText = obras.length;
document.getElementById("caixa").innerText =
"R$ " + caixa.toFixed(2).replace(".",",");

let meta = ((caixa/80000)*100).toFixed(0);
document.getElementById("meta").innerText = meta + "%";

let html = "";

clientes.forEach(c=>{
html += "<p>👥 "+c.nome+" - "+c.tel+"</p>";
});

obras.forEach(o=>{
html += "<p>🪵 "+o.nome+" - R$ "+Number(o.valor).toFixed(2)+"</p>";
});

document.getElementById("lista").innerHTML = html;

salvar();
}

function novoCliente(){
let nome = prompt("Nome cliente:");
if(!nome)return;
let tel = prompt("Telefone:");
clientes.push({nome,tel});
atualizar();
}

function novaEntrada(){
let valor = prompt("Valor entrada:");
if(!valor)return;
caixa += Number(valor);
atualizar();
}

function novaObra(){
let nome = prompt("Nome cliente:");
if(!nome)return;
let valor = prompt("Valor obra:");
obras.push({nome,valor});
atualizar();
}

function limparTudo(){
if(confirm("Apagar tudo?")){
clientes=[];
caixa=0;
obras=[];
atualizar();
}
}

atualizar();
</script>

</body>
</html>
