<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
padding:12px;
}
h1{color:#D4AF37;margin:0 0 6px}
p{color:#bbb;margin:0 0 14px}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
margin-bottom:12px;
cursor:pointer;
}

.board{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:12px;
}

.col{
background:#181818;
padding:10px;
border-radius:14px;
min-height:220px;
}

.card{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:14px;
}

.thumb{
width:48px;
height:48px;
object-fit:cover;
border-radius:8px;
margin:4px 4px 0 0;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
padding:20px;
}

.modal img{
max-width:100%;
max-height:90vh;
border-radius:12px;
}

.close{
position:absolute;
top:15px;
right:15px;
background:#D4AF37;
color:#000;
padding:10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

select,input{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<h1>Innovare Planejados</h1>
<p>Quadro com Fotos</p>

<button onclick="novaObra()">🪵 Nova Obra</button>

<div class="board">

<div class="col"><h3>📞 Lead</h3><div id="lead"></div></div>
<div class="col"><h3>📐 Medição</h3><div id="medicao"></div></div>
<div class="col"><h3>🧾 Orçamento</h3><div id="orcamento"></div></div>
<div class="col"><h3>💰 Fechado</h3><div id="fechado"></div></div>
<div class="col"><h3>🪵 Produção</h3><div id="producao"></div></div>
<div class="col"><h3>🔧 Montagem</h3><div id="montagem"></div></div>
<div class="col"><h3>✅ Entregue</h3><div id="entregue"></div></div>

</div>

<div class="modal" id="modal" onclick="fecharFoto()">
<div class="close">X</div>
<img id="imgGrande">
</div>

<script>
let obras = JSON.parse(localStorage.getItem("obras")) || [];

const etapas = ["lead","medicao","orcamento","fechado","producao","montagem","entregue"];

function salvar(){
localStorage.setItem("obras", JSON.stringify(obras));
}

function render(){

etapas.forEach(e=>{
document.getElementById(e).innerHTML="";
});

obras.forEach((o,i)=>{

if(!o.fotos) o.fotos=[];

let html = `
<div class="card">
<b>${o.nome}</b><br>
📞 ${o.tel}<br>
R$ ${Number(o.valor).toFixed(2)}<br>

<select onchange="mudar(${i},this.value)">
${etapas.map(et=>`<option value="${et}" ${o.etapa==et?'selected':''}>${et}</option>`).join("")}
</select>

<input type="file" accept="image/*" onchange="foto(${i},this)">
`;

o.fotos.forEach(f=>{
html += `<img src="${f}" class="thumb" onclick="abrirFoto('${f}')">`;
});

html += `</div>`;

document.getElementById(o.etapa).innerHTML += html;

});

salvar();
}

function novaObra(){

let nome = prompt("Nome cliente:");
if(!nome)return;

let tel = prompt("Telefone:");
let valor = prompt("Valor:");

obras.push({
nome:nome,
tel:tel||"",
valor:valor||0,
etapa:"lead",
fotos:[]
});

render();
}

function mudar(i,nova){
obras[i].etapa=nova;
render();
}

function foto(i,input){

let file = input.files[0];
if(!file)return;

let reader = new FileReader();

reader.onload = function(e){
obras[i].fotos.push(e.target.result);
render();
}

reader.readAsDataURL(file);
}

function abrirFoto(src){
document.getElementById("imgGrande").src=src;
document.getElementById("modal").style.display="flex";
}

function fecharFoto(){
document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
