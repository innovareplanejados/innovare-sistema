<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Planejados</title>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:Arial;
padding:15px;
}

h1{color:#D4AF37}

.board{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:12px;
}

.col{
background:#181818;
padding:12px;
border-radius:14px;
min-height:260px;
}

.card{
background:#222;
padding:10px;
border-radius:10px;
margin-bottom:8px;
font-size:14px;
}

.alta{border-left:5px solid red;}
.media{border-left:5px solid orange;}
.baixa{border-left:5px solid green;}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#D4AF37;
font-weight:bold;
cursor:pointer;
}

select,a{
width:100%;
margin-top:6px;
padding:8px;
border-radius:8px;
display:block;
text-align:center;
text-decoration:none;
color:#000;
background:#D4AF37;
font-weight:bold;
box-sizing:border-box;
}
</style>
</head>

<body>

<h1>Innovare Planejados</h1>
<p>Quadro Definitivo</p>

<button onclick="novaObra()">🪵 Nova Obra</button>

<div class="board">

<div class="col"><h3>📞 Lead</h3><div id="lead"></div></div>
<div class="col"><h3>📐 Medição</h3><div id="medicao"></div></div>
<div class="col"><h3>🧾 Orçamento</h3><div id="orcamento"></div></div>
<div class="col"><h3>💰 Fechado</h3><div id="fechado"></div></div>
<div class="col"><h3>🪵 Produção</h3><div id="producao"></div></div>
<div class="col"><h3>🔧 Montagem</h3><div id="montagem"></div></div>
<div class="col"><h3>✅ Entregue</h3><div id="entregue"></div></div>

</div>

<script>
let obras = JSON.parse(localStorage.getItem("obras")) || [];

const etapas = [
"lead","medicao","orcamento","fechado",
"producao","montagem","entregue"
];

function salvar(){
localStorage.setItem("obras", JSON.stringify(obras));
}

function render(){

etapas.forEach(e=>{
document.getElementById(e).innerHTML="";
});

obras.forEach((o,i)=>{

let classe = o.prioridade || "media";
let html = "";

if(o.etapa=="lead" || o.etapa=="medicao"){

html = `
<div class="card ${classe}">
<b>${o.nome}</b><br>
📞 ${o.tel}<br>

<select onchange="mudar(${i},this.value)">
${opcoes(o.etapa)}
</select>
</div>
`;

}

else if(o.etapa=="orcamento"){

html = `
<div class="card ${classe}">
<b>${o.nome}</b><br>
R$ ${Number(o.valor).toFixed(2)}<br>
📅 ${o.data}<br>

<select onchange="mudar(${i},this.value)">
${opcoes(o.etapa)}
</select>

<select onchange="prioridade(${i},this.value)">
${prioridades(o.prioridade)}
</select>
</div>
`;

}

else{

html = `
<div class="card ${classe}">
<b>${o.nome}</b><br>
R$ ${Number(o.valor).toFixed(2)}<br>
📞 ${o.tel}<br>
📅 ${o.data}<br>
💵 Pago: R$ ${Number(o.pago).toFixed(2)}<br>
💰 Falta: R$ ${(Number(o.valor)-Number(o.pago)).toFixed(2)}<br>

<select onchange="mudar(${i},this.value)">
${opcoes(o.etapa)}
</select>

<select onchange="prioridade(${i},this.value)">
${prioridades(o.prioridade)}
</select>

<a href="https://wa.me/55${o.tel}" target="_blank">📲 WhatsApp</a>
</div>
`;

}

document.getElementById(o.etapa).innerHTML += html;

});

salvar();
}

function opcoes(atual){
return etapas.map(et=>
`<option value="${et}" ${atual==et?'selected':''}>${et}</option>`
).join("");
}

function prioridades(p){
return `
<option value="alta" ${p=="alta"?'selected':''}>🔴 Alta</option>
<option value="media" ${p=="media"?'selected':''}>🟡 Média</option>
<option value="baixa" ${p=="baixa"?'selected':''}>🟢 Baixa</option>
`;
}

function novaObra(){

let nome = prompt("Nome cliente:");
if(!nome)return;

let tel = prompt("Telefone:");
let valor = prompt("Valor orçamento:");
let pago = prompt("Entrada paga:");
let data = prompt("Data entrega:");

obras.push({
nome:nome,
tel:tel || "",
valor:valor || 0,
pago:pago || 0,
data:data || "-",
prioridade:"media",
etapa:"lead"
});

render();
}

function mudar(i,nova){
obras[i].etapa = nova;
render();
}

function prioridade(i,p){
obras[i].prioridade = p;
render();
}

render();
</script>

</body>
</html>
