<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovare Master Real</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="margin:0;background:#050505;color:#fff;font-family:Arial;padding:20px">

<h1 style="color:#D4AF37">Innovare Planejados</h1>
<p>Banco de Dados Real ☁️</p>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">

<button onclick="novoCliente()" style="padding:16px;background:#D4AF37;border:none;border-radius:12px">👥 Novo Cliente</button>

<button onclick="novaEntrada()" style="padding:16px;background:#111;color:#fff;border:none;border-radius:12px">💰 Entrada</button>

<button onclick="novoOrc()" style="padding:16px;background:#111;color:#fff;border:none;border-radius:12px">🧾 Orçamento</button>

<button onclick="novaAgenda()" style="padding:16px;background:#111;color:#fff;border:none;border-radius:12px">📅 Agenda</button>

</div>

<div style="background:#111;padding:20px;border-radius:15px;margin-top:20px">
<h2>Clientes Online</h2>
<div id="clientes"></div>
</div>

<script>
const supabase = window.supabase.createClient(
'https://ckmotdxrdscateoftboi.supabase.co',
'sb_publishable_05arcMnUYFrLB0xnBX0Upg_GPkSS2_u'
);

async function carregar(){
let {data} = await supabase.from('clientes').select('*').order('id',{ascending:false});
document.getElementById('clientes').innerHTML =
data.map(c=>'<p>👤 '+c.nome+' - '+(c.telefone||'')+'</p>').join('');
}

async function novoCliente(){
let nome = prompt('Nome cliente');
let tel = prompt('Telefone');
if(nome){
await supabase.from('clientes').insert([{nome:nome,telefone:tel}]);
carregar();
}
}

async function novaEntrada(){
let valor = prompt('Valor entrada');
if(valor){
await supabase.from('financeiro').insert([{tipo:'entrada',valor:valor,descricao:'manual'}]);
alert('Entrada salva');
}
}

async function novoOrc(){
let cli = prompt('Cliente');
let val = prompt('Valor');
if(cli){
await supabase.from('orcamentos').insert([{cliente:cli,valor:val,status:'aberto'}]);
alert('Orçamento salvo');
}
}

async function novaAgenda(){
let t = prompt('Compromisso');
let d = prompt('Data');
if(t){
await supabase.from('agenda').insert([{titulo:t,data:d}]);
alert('Agenda salva');
}
}

carregar();
</script>

</body>
</html>
